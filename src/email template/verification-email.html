<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verification Code</title>
</head>
<body style="margin:0; padding:0; background-color:#f4f4f4; font-family:Arial, Helvetica, sans-serif;">

  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#f4f4f4; padding:40px 0;">
    <tr>
      <td align="center">
        <table role="presentation" width="600" cellspacing="0" cellpadding="0" style="background:#ffffff; border-radius:10px; overflow:hidden; box-shadow:0 2px 8px rgba(0,0,0,0.08);">

          <!-- Header -->
          <tr>
            <td style="background:#2563eb; padding:30px; text-align:center;">
              <h1 style="color:#ffffff; margin:0; font-size:28px;">
                Verification Code
              </h1>
            </td>
          </tr>

          <!-- Body -->
          <tr>
            <td style="padding:40px 30px; color:#333333;">
              <h2 style="margin-top:0;">Hello, {{USERNAME}}</h2>

              <p style="font-size:16px; line-height:24px;">
                Your verification code is:
              </p>

              <div style="text-align:center; margin:35px 0;">
                <span style="
                  display:inline-block;
                  background:#f3f4f6;
                  border:2px dashed #2563eb;
                  color:#2563eb;
                  padding:15px 40px;
                  font-size:32px;
                  font-weight:bold;
                  letter-spacing:6px;
                  border-radius:8px;">
                  {{VERIFICATION_CODE}}
                </span>
              </div>

              <p style="font-size:16px; line-height:24px;">
                Enter this code to verify your account. This code will expire in
                <strong>5 minutes</strong>.
              </p>

              <p style="font-size:15px; color:#666666; line-height:22px;">
                If you did not request this verification code, you can safely ignore this email.
              </p>
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="background:#f9fafb; padding:20px; text-align:center; color:#888888; font-size:13px;">
              © 2026 Your Company. All rights reserved.
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>

</body>
</html>
